{% macro leftMenuSubItem(item, currentPage, documentation, position=0) %}
<li class="relative">
  <a
    class="block h-6 w-full pl-3.5 before:pointer-events-none before:absolute before:-left-1 before:top-2.5 before:h-1.5 before:w-1.5 before:-translate-y-1/2 before:rounded-full {% if currentPage.id == item.id %}font-semibold text-sky-500 before:bg-sky-500{%else%}text-slate-500 before:hidden before:bg-slate-300 hover:text-slate-600 hover:before:block{%endif%}"
    href="/doc/{{documentation.id}}/{{item.filename}}"
    >{{item.title}}</a
  >
  {% if item.children | length %}
  <ul
    class="space-y-4 mt-2 border-l-2 border-slate-100 dark:border-slate-800 lg:mt-4 lg:space-y-4 lg:border-slate-200"
    style="margin-left: {{position+1}}rem"
  >
    {% for item in item.children %} {{ leftMenuSubItem( item,
    currentPage,documentation, position+1) }} {% endfor %}
  </ul>
  {%endif%}
</li>
{% endmacro %}
