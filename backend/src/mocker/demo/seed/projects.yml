  - title: Garage Clean Up (Non Software)
    body: |
      Everyone is pitching in! We really need to clean out the start-up's garage, it's full of old bike parts, holiday decorations that we don't use, and random stuff from Marketing (sorry guys, you know it's true).
      I've created a workflow and a product for this initiative. We can archive everything when we're done but setting things up this way will be a good way to track the project. We've been trying to do this for a couple of years and have gotten… distracted each time.
      Let's do this!
      # Project Notes
      The workflow holds the phases of the cleanup (Sort and discard, Organize, Clean, Stage for moving back in) This way, each ticket can represent different areas of the garage or different classifications of stuff.
      ## Items to Attend to
      list:
      - Marketing closet
      - Marketing corner
      - Marketing loft (for goodness sakes guys, stop spreading out!)
      - Bicycle graveyard
      - Holiday decorations
      - Artwork and posters"
      - Some of the items will be things to do after the initial cleanup is complete
      - Build storage racks
      - Clean windows
      - Sweep the floors
      - Fix bikes, then discard parts
      - Reseal concrete
      - Move things back in
      After we complete this project, we'll be able to buy a new fridge so we'll never run out of sparkling water again! Just don't forget your lunches in there like last time… that fridge was not saveable.

    tickets:
      - title: Marketing closet - Initial clean up
        product: Garage Clean Up
        workflow: garage clean up
        description: |
          Go through the marketing closet and sort through all the collateral, schwag, posters, and life-sized cardboard cutouts of Corinne. Determine what to keep and what to toss. Pull everything out since we'll be painting this later.
        after:
          - Build Storage Racks
          - Sweep the floors

      - title: Marketing corner - Initial clean up
        product: Garage Clean Up
        workflow: garage clean up
        description: |
          Marketing has created a mound of marketing materials in the north east corner of the garage. It's possible there are other corners of undiscovered detritus from marketing floating around but the north east corner is the only one I'm aware of. Go through and categorize all of the stuff, earmark things for donation, and toss the rest. Leave the corner empty since we'll be re-sealing the garage floor.
        after:
          - Build Storage Racks
          - Sweep the floors

      - title: Marketing loft - Initial clean up (for goodness sakes guys, stop spreading out!)
        product: Garage Clean Up
        workflow: garage clean up
        description: |
          Marketing also has taken over the loft in the garage that we used to use for office supplies. I'm sure there are some ancient office supplies buried somewhere in there. If you come across any, feel free to take those relics home. Otherwise, just toss them out.
          Marketing, you guys need to stop buying stuff and tossing it into the loft. I needed a pen the other day and when I went to get it, I nearly caused an avalance of posters from the last conference we went to.
        after:
          - Build Storage Racks
          - Sweep the floors

      - title: Bicycle graveyard
        product: Garage Clean Up
        workflow: garage clean up
        description: |
          Somehow, we've been accumulating old bicycles, bicycle parts, broken locks, and flat tires. It would be nice if we could clear that area so we can actually put a functinal bike rack for people to use instead of piling bikes on bikes on bikes.
        after:
          - Build Storage Racks
          - Fix bikes, then discard parts

      - title: Holiday decorations
        product: Garage Clean Up
        workflow: garage clean up
        description: |
          We have bins and boxes of holiday decorations that are in various stages of disrepair. Please figure out which light strings still work and toss the broken ones. I think we have more non-op stuff than stuff that works. Also, if you come across an inflatable santa with a bottle of grog, let Amos know. He's been looking for that.
        after:
          - Build Storage Racks

      - title: Artwork and posters
        product: Garage Clean Up
        workflow: garage clean up
        description: |
          We have stacks on stack on stacks of artwork from various offices. After three office moves, we seem to have more artwok in the corners than on the walls.
          Please go through and sort it into the following piles depending on the content: 
          - Star Wars
          - Star Trek
          - Battlestar Galactica
          - Stargate
          - French Impressionists
          - Kandinsksy
          - Piet Hein
          - Everything Else
        after:
          - Build Storage Racks

      - title: Build storage racks
        product: Garage Clean Up
        workflow: to do
        description: |
          Once everything else is done, please build storage racks

      - title: Clean windows
        product: Garage Clean Up
        workflow: to do
        description: |
          Once the walls are clear, feel free to start cleaning the windows. Buckets and sponges will be provided

      - title: Sweep the floors
        product: Garage Clean Up
        workflow: to do
        description: |
          Once marketing has cleared their areas, we can sweep the floors.
        after:
          - Reseal Concrete

      - title: Fix bikes, then discard parts
        product: Garage Clean Up
        workflow: to do
        description: |
          Figure out which bikes to salvage and toss any that don't work 100%. Not 99%, not "oh, this is just missing a pedal but I can make it work if I just use one leg." They have to be 100% functional othewise they're going to the recycling plant.
        after:
          - Move things back in

      - title: Reseal concrete
        product: Garage Clean Up
        workflow: to do
        description: |
          Once the floors are swept, we'll have a contractor come in and resesal the concrete
        after:
          - Move things back in

      - title: Move things back in
        product: Garage Clean Up
        workflow: to do
        description: |
          Once the floor is dry, we'll move things back in and celebrate our new, clean garage!
