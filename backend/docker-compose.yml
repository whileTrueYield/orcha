services:
  db:
    image: postgres:16
    container_name: integration-tests-prisma
    restart: always
    ports:
      - 2345:5432
    environment:
      - POSTGRES_PASSWORD=testy-mc-testface
      - POSTGRES_USER=jester
      - POSTGRES_DATABASE=tests
    volumes:
      - db:/var/lib/postgresql/data

volumes:
  db:
    driver: local
