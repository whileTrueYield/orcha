# ============================================================================
# Orcha — Digital Ocean App Platform spec
# ============================================================================
#
# Six services + one static frontend on orcha.run (ADR #0002, #0003).
# Prisma migrations run at API startup (idempotent, no-op when current).
#
# Managed resources (defined below, auto-wired via ${resource.VAR}):
#   - Managed PostgreSQL 16 (orcha-db)
#   - Managed Valkey 8 (orcha-redis)
#   - DO Spaces (set S3_*, UPLOADS_*, DOCS_* env vars in DO console)
#
# Secrets: after creating the app, set values marked [SECRET] in the
# DO console under each component's env var settings.
#
# ============================================================================

name: orcha
region: sfo

domains:
  - domain: orcha.run
    type: PRIMARY

# ---- App-level env vars --------------------------------------------------
# These are shared across all components. Set actual values in the DO console.
# Component-level envs reference these via ${VAR_NAME}.

envs:
  # Session
  - key: ORCHA_SESSION_SECRET
    scope: RUN_TIME
    type: SECRET
    value: "CHANGE_ME"
  # S3-compatible storage (DO Spaces)
  - key: S3_ENDPOINT
    scope: RUN_TIME
    value: "CHANGE_ME"
  - key: S3_ACCESS_KEY
    scope: RUN_TIME
    type: SECRET
    value: "CHANGE_ME"
  - key: S3_SECRET_KEY
    scope: RUN_TIME
    type: SECRET
    value: "CHANGE_ME"
  - key: S3_REGION
    scope: RUN_TIME
    value: "sfo3"
  - key: UPLOADS_BUCKET
    scope: RUN_TIME
    value: "CHANGE_ME"
  - key: UPLOADS_CDN_URL
    scope: RUN_TIME
    value: "CHANGE_ME"
  - key: DOCS_BUCKET
    scope: RUN_TIME
    value: "CHANGE_ME"
  - key: DOCS_CDN_URL
    scope: RUN_TIME
    value: "CHANGE_ME"
  # Push notifications
  - key: VAPID_PUBLIC_KEY
    scope: RUN_TIME
    value: "CHANGE_ME"
  - key: VAPID_PRIVATE_KEY
    scope: RUN_TIME
    type: SECRET
    value: "CHANGE_ME"
  # Email (SMTP or Resend — set whichever you use)
  - key: SMTP_HOST
    scope: RUN_TIME
    value: "CHANGE_ME"
  - key: SMTP_PORT
    scope: RUN_TIME
    value: "CHANGE_ME"
  - key: SMTP_USER
    scope: RUN_TIME
    value: "CHANGE_ME"
  - key: SMTP_PASS
    scope: RUN_TIME
    type: SECRET
    value: "CHANGE_ME"
  - key: RESEND_API_KEY
    scope: RUN_TIME
    type: SECRET
    value: "CHANGE_ME"

# ---- Managed databases ---------------------------------------------------

databases:
  - name: orcha-db
    engine: PG
    version: "16"
    production: true
    cluster_name: orcha-db
    db_name: orcha
    db_user: doadmin
  - name: orcha-redis
    engine: VALKEY
    version: "8"
    production: true
    cluster_name: orcha-redis

# ---- Services (HTTP-receiving) -------------------------------------------

services:
  # -- API server (GraphQL + REST) --
  - name: api
    github:
      repo: whileTrueYield/orcha
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 4000
    instance_size_slug: professional-xs
    instance_count: 1
    routes:
      - path: /api
    health_check:
      http_path: /api/alive
    run_command: npx prisma migrate deploy && node dist/server.js
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: "${orcha-db.DATABASE_URL}"
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: ORCHA_BACKEND_PORT
        scope: RUN_TIME
        value: "4000"
      - key: ORCHA_WS_BACKEND_PORT
        scope: RUN_TIME
        value: "38268"
      - key: ORCHA_HOSTNAME
        scope: RUN_TIME
        value: orcha.run
      - key: ORCHA_DOMAIN
        scope: RUN_TIME
        value: orcha.run
      - key: ORCHA_WEBAPP_URI
        scope: RUN_TIME
        value: https://orcha.run
      - key: ORCHA_WWW_URI
        scope: RUN_TIME
        value: https://orcha.run
      - key: ORCHA_API_URI
        scope: RUN_TIME
        value: https://orcha.run/api
      - key: ORCHA_API_WS_URI
        scope: RUN_TIME
        value: wss://orcha.run/ws
      - key: ORCHA_SUPPORT_URI
        scope: RUN_TIME
        value: https://orcha.run/support
      - key: ORCHA_TEST_INTERFACE
        scope: RUN_TIME
        value: "false"
      - key: NO_COLOR
        scope: RUN_TIME
        value: "true"
      # DO App Platform preserves the /api prefix — tell Express to mount there
      - key: API_PATH_PREFIX
        scope: RUN_TIME
        value: /api
      # Resource references (can't inherit — need explicit wiring)
      - key: ORCHA_AI_URI
        scope: RUN_TIME
        value: "http://${ai.INTERNAL_URL}:8000"
      - key: REDIS_URL
        scope: RUN_TIME
        value: "${orcha-redis.DATABASE_URL}"

  # -- Hocuspocus (WebSocket CRDT collaboration) --
  - name: hocuspocus
    github:
      repo: whileTrueYield/orcha
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    http_port: 38268
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /ws
    run_command: node dist/hocuspocus/server.js
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: "${orcha-db.DATABASE_URL}"
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: ORCHA_WS_BACKEND_PORT
        scope: RUN_TIME
        value: "38268"
      - key: ORCHA_HOSTNAME
        scope: RUN_TIME
        value: orcha.run
      - key: ORCHA_DOMAIN
        scope: RUN_TIME
        value: orcha.run
      - key: ORCHA_API_WS_URI
        scope: RUN_TIME
        value: wss://orcha.run/ws
      - key: REDIS_URL
        scope: RUN_TIME
        value: "${orcha-redis.DATABASE_URL}"

  # -- MCTS AI scheduler (internal only, called by cron worker) --
  - name: ai
    github:
      repo: whileTrueYield/orcha
      branch: main
      deploy_on_push: true
    source_dir: ai
    dockerfile_path: ai/Dockerfile
    internal_ports:
      - 8000
    instance_size_slug: professional-xs
    instance_count: 1

  # -- Support widget --
  - name: support
    github:
      repo: whileTrueYield/orcha
      branch: main
      deploy_on_push: true
    source_dir: support
    dockerfile_path: support/Dockerfile
    http_port: 3001
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /support
    envs:
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: production
      - key: PORT
        scope: RUN_TIME
        value: "3001"
      - key: VITE_WEBSITE_NAME
        scope: BUILD_TIME
        value: Orcha Support
      - key: VITE_SUPPORT_URI
        scope: BUILD_TIME
        value: https://orcha.run/support
      - key: VITE_API_URI
        scope: BUILD_TIME
        value: https://orcha.run/api
      - key: VITE_DOCUMENTATION_URI
        scope: BUILD_TIME
        value: https://orcha.run/api
      - key: VITE_UPLOADS_CDN_URL
        scope: BUILD_TIME
        value: https://orcha-uploads.sfo3.cdn.digitaloceanspaces.com

  # -- Frontend (SPA served by nginx) --
  - name: frontend
    github:
      repo: whileTrueYield/orcha
      branch: main
      deploy_on_push: true
    source_dir: /
    dockerfile_path: frontend/Dockerfile.prod
    http_port: 80
    instance_size_slug: basic-xxs
    instance_count: 1
    routes:
      - path: /
    envs:
      - key: VITE_API_URI
        scope: BUILD_TIME
        value: https://orcha.run/api
      - key: VITE_API_WS_URI
        scope: BUILD_TIME
        value: wss://orcha.run/ws
      - key: VITE_GRAPHQL_URI
        scope: BUILD_TIME
        value: https://orcha.run/api/graphql
      - key: VITE_UPLOADS_CDN_URL
        scope: BUILD_TIME
        value: https://orcha-uploads.sfo3.cdn.digitaloceanspaces.com
      - key: VITE_SUPPORT_URI
        scope: BUILD_TIME
        value: https://orcha.run/support
      - key: VITE_DOCUMENTATION_URI
        scope: BUILD_TIME
        value: https://orcha.run/api
      - key: VITE_WEBSITE_DOMAIN
        scope: BUILD_TIME
        value: orcha.run
      - key: VITE_VAPID_PUBLIC_KEY
        scope: BUILD_TIME
        value: BFYUfpTkC_8_C8qHD5_IWaTjwBE4HR0xgytWgNoCuNsmJTKwj62jnYtn3uuOBdRUSgnstIm6YiJxzS2HC2BpnMU
      - key: VITE_DEMO_MODE
        scope: BUILD_TIME
        value: "false"

# ---- Workers (no HTTP) ---------------------------------------------------

workers:
  # -- Cron worker (BullMQ job processor) --
  - name: cron
    github:
      repo: whileTrueYield/orcha
      branch: main
      deploy_on_push: true
    source_dir: backend
    dockerfile_path: backend/Dockerfile
    instance_size_slug: basic-xxs
    instance_count: 1
    run_command: node dist/cron.js
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        value: "${orcha-db.DATABASE_URL}"
      - key: NODE_ENV
        scope: RUN_TIME
        value: production
      - key: ORCHA_BACKEND_PORT
        scope: RUN_TIME
        value: "4000"
      - key: ORCHA_WS_BACKEND_PORT
        scope: RUN_TIME
        value: "38268"
      - key: ORCHA_HOSTNAME
        scope: RUN_TIME
        value: orcha.run
      - key: ORCHA_DOMAIN
        scope: RUN_TIME
        value: orcha.run
      - key: ORCHA_WEBAPP_URI
        scope: RUN_TIME
        value: https://orcha.run
      - key: ORCHA_WWW_URI
        scope: RUN_TIME
        value: https://orcha.run
      - key: ORCHA_API_URI
        scope: RUN_TIME
        value: https://orcha.run/api
      - key: ORCHA_API_WS_URI
        scope: RUN_TIME
        value: wss://orcha.run/ws
      - key: ORCHA_SUPPORT_URI
        scope: RUN_TIME
        value: https://orcha.run/support
      - key: ORCHA_TEST_INTERFACE
        scope: RUN_TIME
        value: "false"
      - key: NO_COLOR
        scope: RUN_TIME
        value: "true"
      # Resource references (can't inherit — need explicit wiring)
      - key: ORCHA_AI_URI
        scope: RUN_TIME
        value: "http://${ai.INTERNAL_URL}:8000"
      - key: REDIS_URL
        scope: RUN_TIME
        value: "${orcha-redis.DATABASE_URL}"
