# CI — runs the test suites and the backend typecheck on every PR and on
# pushes to main. Each job sets up only what its suite needs and calls the
# underlying tools directly (yarn / jest / pytest) rather than the `make`
# targets: the Makefile targets exist to make local dev foolproof (auto-install,
# auto-generate types, avoid the ts-node ESM race), but CI runs each step
# explicitly and in a known order, so the direct commands are clearer in the
# logs and cache better.
#
# Deployment is intentionally NOT here — DigitalOcean App Platform keeps its
# own auto-deploy on merge; this workflow only gates correctness.
#
# To make these checks block merges, mark them as required status checks in
# the repo's branch-protection settings (GitHub UI / API) — the workflow does
# not configure that itself.

name: CI

on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same ref makes the in-flight run obsolete — cancel it so
# we don't burn runner minutes on stale commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    services:
      # Values must match backend/.env.test's DATABASE_URL:
      # postgresql://webapp:postgres@localhost:5432/tests
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: webapp
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U webapp -d tests"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # Several backend specs (rate limiting, auth, email) hit Redis live.
      # .env.test sets no REDIS_HOSTNAME, so the client defaults to
      # 127.0.0.1:6379 — which this mapped service container answers.
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backend/yarn.lock
      - name: Install dependencies
        run: yarn --cwd backend install --frozen-lockfile
      - name: Generate Prisma client
        run: yarn --cwd backend prisma generate
      - name: Push schema to test database
        # test:db:push runs `dotenv -e .env.test -- prisma db push`, so it picks
        # up the test DATABASE_URL automatically.
        run: yarn --cwd backend test:db:push
      - name: Run tests
        run: yarn --cwd backend test

  backend-typecheck:
    name: Backend typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: backend/yarn.lock
      - name: Install dependencies
        run: yarn --cwd backend install --frozen-lockfile
      - name: Generate Prisma client
        # tsc needs the generated @generated/type-graphql types to resolve.
        run: yarn --cwd backend prisma generate
      - name: Typecheck
        run: yarn --cwd backend typecheck

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Install dependencies
        run: yarn --cwd frontend install --frozen-lockfile
      - name: Run tests
        # The jest script already pins TZ=UTC. The generated GraphQL types
        # (frontend/src/types/graphql.ts) are committed, so no codegen needed.
        run: yarn --cwd frontend test

  ai-tests:
    name: AI tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai/requirements.txt
      - name: Install dependencies
        run: pip install -r ai/requirements.txt
      - name: Run tests
        run: PYTHONPATH=./ai pytest
