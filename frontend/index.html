<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.png" />
    <meta name="twitter:dnt" content="on" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ffffff" />
    <meta
      name="description"
      content="Project and engineering performance platform"
    />
    <link
      rel="stylesheet"
      type="text/css"
      media="screen"
      href="/font/font.css"
    />
    <link rel="apple-touch-icon" href="/logo192.png" />
		<script async src="https://plausible.io/js/pa-g1YVYooOCvxcb1aoXQau1.js"></script>
		<script>
			window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
			plausible.init()
		</script>

    <!--
      This prevents anyone from embbeding us in an iframe. We use this
      instead of window, since this is immutable and === window when
      used at the root (window is mutable)
    -->
    <script>
      if (this.location.hostname !== "localhost") {
        this.top.location !== this.location &&
          (this.top.location = this.location);
      }
    </script>

    <script>
      window.EXCALIDRAW_ASSET_PATH = "/";
    </script>

    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="/manifest.json" />
    <!--
      Notice the use of  in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>%VITE_WEBSITE_NAME%</title>
  </head>
  <body class="h-full bg-gray-100 antialiased">
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root" class="h-full"></div>
    <div id="popup-root"></div>
    <div id="popper-root"></div>

    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
    <script
      defer
      data-domain="app.%VITE_WEBSITE_DOMAIN%"
      src="https://metrix.orchalabs.com/js/plausible.js"
    ></script>

    <!--
      We do not show the support button by default here, 
      instead we only show it using the support API after
      the user logs in
    -->
    <script
      defer
      data-product-id="1"
      data-show-button="false"
      src="%VITE_SUPPORT_URI%/orcha-support.js"
    ></script>
    <script>
      window.OrchaSupport = window.OrchaSupport || [];
    </script>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
