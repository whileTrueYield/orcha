# Serves the Orcha SPA. DO App Platform handles path-based routing
# at the ingress level — this config only serves static files and
# falls back to index.html for client-side routing.

server {
  listen 80;
  server_name _;

  root /www-frontend;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 860;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_types
    text/css
    text/plain
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  location / {
    try_files $uri /index.html;
  }
}
