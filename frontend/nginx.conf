server {
  # Accept requests from any domain
  server_name _;
  server_name app.staging-orcha.com;

  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 5;
  gzip_min_length 860;
  gzip_buffers 16 8k;
  gzip_http_version 1.1;
  gzip_types 
    text/css
    text/plain
    text/javascript
    application/javascript
    application/json
    application/x-javascript
    application/xml
    application/xml+rss
    application/xhtml+xml
    application/x-font-ttf
    application/x-font-opentype
    application/vnd.ms-fontobject
    image/svg+xml
    image/x-icon
    image/png
    image/jpeg
    application/rss+xml
    application/atom_xml;

  error_page 502 503 /www-frontend/503.html;
  
  root /www-frontend;

  location / {
    access_log off;

    # if cannot find static file, use the index.html in the root directory
    try_files $uri /index.html;
  }
}

